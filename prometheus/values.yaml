grafana:
  enabled: false

alertmanager:
  enabled: true
  service:
    type: NodePort

prometheus:
  service:
    type: NodePort

  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true