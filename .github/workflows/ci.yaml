name: Zabbix Helm CI

on:
  push:
    paths:
      - "zabbix/zabbix-kubernetes-helm/values.yaml"
  pull_request:

env:
  CHART_URL: https://cdn.zabbix.com/zabbix/integrations/kubernetes-helm/7.4/zabbix-helm-chart-1.6.8.tgz
  VALUES_FILE: zabbix/zabbix-kubernetes-helm/values.yaml

jobs:
  helm-ci:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        kubernetes-version: ["1.30.0", "1.34.5"]

    name: Kubernetes ${{ matrix.kubernetes-version }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Helm
      run: |
        curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Helm version
      run: helm version

    - name: Install kubeconform
      run: |
        curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
        sudo mv kubeconform /usr/local/bin

    - name: Download Zabbix Chart
      run: |
        curl -L $CHART_URL -o chart.tgz

    - name: Helm lint
      run: |
        helm lint chart.tgz \
        -f $VALUES_FILE

    - name: Render Helm templates
      run: |
        helm template zabbix chart.tgz \
        --namespace monitoring \
        -f $VALUES_FILE \
        > rendered.yaml

    - name: Validate manifests for Kubernetes ${{ matrix.kubernetes-version }}
      run: |
        kubeconform \
          -kubernetes-version ${{ matrix.kubernetes-version }} \
          -summary rendered.yaml

    - name: Show generated resources
      run: |
        echo "Resources generated:"
        grep "kind:" rendered.yaml | sort | uniq

    - name: Upload rendered manifests
      uses: actions/upload-artifact@v5
      with:
        name: zabbix-manifest-k8s-${{ matrix.kubernetes-version }}
        path: rendered.yaml